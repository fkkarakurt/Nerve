<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nerve — a language model in your browser</title>
<style>
  :root { --bg:#0d1117; --fg:#e6edf3; --mut:#8b949e; --acc:#7ee787; --card:#161b22; --line:#30363d; --err:#ff7b72; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .wrap { width:100%; max-width:720px; }
  h1 { margin:0 0 4px; font-size:28px; } h1 .dot { color:var(--acc); }
  .sub { color:var(--mut); margin:0 0 20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  textarea { width:100%; min-height:64px; resize:vertical; background:#0d1117; color:var(--fg);
             border:1px solid var(--line); border-radius:8px; padding:10px; font-size:15px; }
  .row { display:flex; gap:12px; align-items:center; margin:12px 0; flex-wrap:wrap; }
  label { color:var(--mut); font-size:13px; }
  button { background:var(--acc); color:#04260f; border:0; border-radius:8px; padding:10px 18px;
           font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { background:#21262d; color:var(--mut); cursor:default; }
  #out { white-space:pre-wrap; margin-top:14px; min-height:120px; background:#0d1117;
         border:1px solid var(--line); border-radius:8px; padding:12px; }
  #status { margin-top:10px; font-size:13px; color:var(--mut); }
  #status.err { color:var(--err); }
  .foot { color:var(--mut); font-size:13px; margin-top:18px; text-align:center; }
  .badge { color:var(--acc); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Nerve<span class="dot">.</span></h1>
  <p class="sub">A real language model running <b>entirely in your browser</b> —
     no server, no GPU, no data leaving this page. ~15&nbsp;MB, loaded once.</p>

  <div class="card">
    <textarea id="prompt">Once upon a time</textarea>
    <div class="row">
      <label>length <span id="lenv">120</span></label>
      <input id="len" type="range" min="20" max="256" value="120">
      <label>creativity <span id="tv">0.80</span></label>
      <input id="temp" type="range" min="0" max="120" value="80">
      <button id="go" disabled>Loading model…</button>
    </div>
    <div id="out"></div>
    <div id="status">starting…</div>
  </div>

  <p class="foot">Powered by <span class="badge">Nerve</span> — a single-header,
     zero-dependency neural-network engine in pure C, compiled to WebAssembly.</p>
</div>

<script src="nerve.js"></script>
<script>
  var M = null, buf = "";
  function $(id){ return document.getElementById(id); }
  function setStatus(s, err){ var e=$("status"); e.textContent=s; e.className = err?"err":""; }
  window.addEventListener("error", function(ev){ setStatus("JS error: " + ev.message, true); });

  var lenEl=$("len"), tempEl=$("temp"), goEl=$("go"), promptEl=$("prompt"), outEl=$("out");
  lenEl.oninput  = function(){ $("lenv").textContent = lenEl.value; };
  tempEl.oninput = function(){ $("tv").textContent = (tempEl.value/100).toFixed(2); };

  function run(){
    if(!M){ return; }
    buf=""; outEl.textContent=""; goEl.disabled=true; goEl.textContent="generating…"; setStatus("generating…");
    setTimeout(function(){          // let the UI repaint before the synchronous call
      try {
        var t0 = performance.now();
        M.ccall("nerve_web_generate","null",
          ["string","number","number","number","number"],
          [promptEl.value, parseInt(lenEl.value,10), parseInt(tempEl.value,10)/100, 0.9, (Math.random()*1e9)|0]);
        var dt=(performance.now()-t0)/1000;
        setStatus("done — " + parseInt(lenEl.value,10) + " tokens in " + dt.toFixed(1) + "s");
      } catch(e){ setStatus("generate error: " + e, true); }
      goEl.disabled=false; goEl.textContent="Generate";
    }, 30);
  }

  if (typeof createNerve !== "function") {
    setStatus("createNerve missing — nerve.js failed to load", true);
  } else {
    setStatus("loading model (~15 MB)…");
    createNerve({
      onPiece: function(s){ buf += s; outEl.textContent = buf; },
      printErr: function(s){ console.error(s); }
    }).then(function(mod){
      M = mod;
      var rc = M.ccall("nerve_web_init","number",[],[]);
      if (rc !== 0){ setStatus("model load failed (code " + rc + ")", true); return; }
      goEl.disabled=false; goEl.textContent="Generate"; goEl.onclick=run;
      setStatus("ready — press Generate");
    }).catch(function(e){ setStatus("init failed: " + e, true); });
  }
</script>
</body>
</html>

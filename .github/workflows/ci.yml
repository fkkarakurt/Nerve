name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# A new push supersedes an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── The suite: correctness first, on every platform we claim to support ────
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: "GCC / Linux",   cc: gcc,   werror: true }
          - { os: ubuntu-latest, name: "Clang / Linux", cc: clang, werror: true }
          - { os: macos-latest,  name: "Clang / macOS", cc: cc,    werror: true }
    env:
      CC: ${{ matrix.cc }}
      WARN: ${{ matrix.werror && '-Wall -Wextra -pedantic -Werror' || '-Wall -Wextra -pedantic' }}
    steps:
      - uses: actions/checkout@v5

      - name: Compiler version
        run: $CC --version

      - name: Test suite
        run: |
          set -eux
          $CC -O2 -std=c99 $WARN tests/test_nerve.c -o test_nerve -lm
          ./test_nerve

      - name: Build every example
        run: |
          set -eu
          for f in examples/*.c; do
            printf '  %-42s' "$f"
            $CC -O2 -std=c99 $WARN "$f" -o /tmp/nerve_example -lm
            echo ok
          done

      - name: Build the studies (transformer, autodiff, encoder, MNIST)
        run: |
          set -eu
          for f in studies/infer/*.c studies/embed/*.c studies/autograd/*.c \
                   studies/mnist/*.c studies/geotechnical/*.c; do
            printf '  %-42s' "$f"
            $CC -O2 -std=c99 -Wall -Wextra -c "$f" -o /tmp/nerve_study.o
            echo ok
          done

  # ── The ANSI C claim, enforced rather than asserted ────────────────────────
  c89:
    name: ANSI C89 conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: nerve.h must compile as strict C89
        run: |
          set -eux
          # The README advertises ANSI C89 compatibility for the core library.
          # -std=c89 -pedantic-errors makes that a build failure, not a promise.
          gcc -O2 -std=c89 -pedantic-errors -Wall -Wextra -Werror \
              examples/01_xor.c -o xor_c89 -lm
          ./xor_c89

  # ── Undefined behaviour and memory errors ─────────────────────────────────
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test suite under sanitizers
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: detect_leaks=1
        run: |
          set -eux
          gcc -O1 -g -std=c99 -fsanitize=address,undefined \
              -fno-omit-frame-pointer -fno-sanitize-recover=all \
              tests/test_nerve.c -o test_asan -lm
          ./test_asan

      - name: Examples under sanitizers
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: detect_leaks=1
        run: |
          set -eux
          # The terminal games (10-12) render forever and need a TTY, so the
          # sanitizer pass covers the batch examples only.
          for f in examples/0*.c; do
            gcc -O1 -g -std=c99 -fsanitize=address,undefined \
                -fno-omit-frame-pointer -fno-sanitize-recover=all \
                "$f" -o /tmp/san_ex -lm
            /tmp/san_ex > /dev/null
            echo "  ok $f"
          done

  # ── Windows ───────────────────────────────────────────────────────────────
  windows:
    name: GCC / Windows (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Test suite
        run: |
          set -eux
          gcc -O2 -std=c99 -Wall -Wextra -pedantic tests/test_nerve.c -o test_nerve.exe -lm
          ./test_nerve.exe

      - name: Build every example
        run: |
          set -eu
          for f in examples/*.c; do
            printf '  %-42s' "$f"
            gcc -O2 -std=c99 -Wall -Wextra "$f" -o /tmp/nerve_example.exe -lm
            echo ok
          done

  # ── The browser build must not rot ────────────────────────────────────────
  wasm:
    name: WebAssembly build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61
          actions-cache-folder: emsdk-cache

      - name: Compile the WebAssembly entry points
        run: |
          set -eux
          # Compile only: linking the demo would need the model blobs, which
          # are release assets rather than repository content. This still
          # catches the usual rot -- a header change that breaks the browser
          # target while the native build stays green.
          emcc -O3 -msimd128 -Wall -Wextra -c web/nerve_web.c -o /tmp/nerve_web.o
